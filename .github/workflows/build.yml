name: build-apk
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Build APK
        run: |
          flutter create --org com.tofrix --project-name tofrixapp app
          cp lib/main.dart app/lib/main.dart
          cd app
          flutter pub add google_fonts
          flutter build apk --release
          cp build/app/outputs/flutter-apk/app-release.apk ../tofrix-app.apk
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: TOFRIX APK
          files: tofrix-app.apk